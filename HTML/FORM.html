<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="gridboot.css">
</head>
<body>
    <div class="container">
       <h2>form demo </h2>
       <form class="mb-3">
        <div class="row">
            <div class="col-md-6 mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="text" class="form-control" id="email" placeholder="email">
        </div>
        <div class="col-md-6 mb-3">
        <label for="pass" class="form-label">Password</label>
        <input type="password" class="form-control" id="pass" placeholder="Password">
    </div>    
    </div>
        <label for="address" class="form-label">Address</label>
        <input type="text" class="form-control-sm" id="address" placeholder="address">
        <div class="mb-3">
            <select class="form-select">
                <option selected>select something</option>
                <option value="1">one</option>
                <option value="2">two</option>
                <option value="3">three</option>
                <option value="4">four</option>
            </select>
        </div>
        <div class="normal mb-3">
            <label for="agree">agree</label>
            <input type="checkbox" id="agree">
        </div>
        <div class="form-check mb-3">
            <label for="agreebs" class="form-check-label">agree</label>
            <input type="checkbox" id="agreebs" class="form-check-input">
        </div>
        <div class="form-check mb-3">
            <label for="redio" class="form-check-label">Yes/No</label>
            <input type="radio" id="radio" class="form-check-input">
        </div>
        <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" role="switch" id="switchCheckDefault">
            <label class="form-check-label" for="switchCheckDefault">Default switch checkbox input</label>
        </div>
    </form>
    </div>
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
